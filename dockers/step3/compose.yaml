services:
    diode_src:
        image: diode_src:latest
        ports:
            #SFTP: diode_client/{Thisp@ssw0rdShouldN0tB3GUESSED}
            - 2222:2222
        networks:
            internal_diode_net:
                ipv4_address: 10.0.55.100

    diode_dst:
        image: diode_dst:latest
        # volumes:
        #  must be user supplied if diode_dst have been configured with CHALLENGER data
            # - ./inputs/lobster_ignition.bin:/home/diode/crypto/lobster_ignition.bin
        ports:
            #HLS
            - 5900:5900
            #debug : diode front
            # - 1789:1789/udp
            #debug : direct access to step4
            # - 1515:1515
        networks:
            internal_diode_net:
                ipv4_address: 10.0.55.150

networks:
    internal_diode_net: 
        ipam:
            driver: default
            config:
                - subnet : "10.0.55.0/24" 
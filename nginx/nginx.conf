server {
    listen 80 default_server;
    root /var/www/html;
    index index.html;
    server_name _;

    #filer old
    location /rdglvlniebdgjmdd/ {
        autoindex on;
    }

    #filer urls
    ##13/04
    location /aoxgulmpgdvaagnd/ {
        autoindex on;
    }

    ##20/04
    location /dugrlpdehkejwdga/ {
        alias /var/www/html/aoxgulmpgdvaagnd/;
	autoindex on;
    }
    ##27/04
    location /eqpyrgwcgpamgelo/ {
        alias /var/www/html/aoxgulmpgdvaagnd/;
	autoindex on;
    }

    ##04/05
    location /iugedyadeveiblcc/ {
        alias /var/www/html/aoxgulmpgdvaagnd/;
	autoindex on;
    }
    
    ##11/05
    location /ffggohieoggpudgn/ {
        alias /var/www/html/aoxgulmpgdvaagnd/;
	autoindex on;
    }

    # Fichiers statiques servis directement par nginx
    location /static/ {
        alias /opt/sstic-ptf/src/static/;
        expires 1h;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Application Flask
    location /step/ {
        proxy_pass http://127.0.0.1:8080/step/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Requis pour les SSE (Server-Sent Events)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;

        # Les flux SSE peuvent durer jusqu'a 120s
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
